<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    {% for crumb in breadcrumbs %}
      {% if crumb.url %}
        <li class="breadcrumb-item">
          <a class="text-danger" href="{{ crumb.url }}">{{ crumb.name }}</a>
        </li>
      {% else %}
        <li class="breadcrumb-item active">
          {{ crumb.name }}
        </li>
      {% endif %}
    {% endfor %}
  </ol>
</nav>
